<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marin Century 2026 — Registration Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--c2024:#7cb668;--c2025:#2d6a2e;--c2026:#c2410c;--c2026b:#9a3412;--muted:#a8a29e;--bg:#fafaf7;--card:#fff;--border:#e7e5e0;--text:#292524;--text2:#78716c;--alt:#f9f8f5;--head:#f3f2ee;--gap:#efeeea;--ytd-bg:#e8e4da;--fy-bg:#dde5d8}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);font-family:'DM Sans',system-ui,sans-serif;color:var(--text)}
.hdr{padding:20px 24px 0;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px}
.hdr h1{font-size:24px;font-weight:900;color:var(--c2026b);letter-spacing:-0.02em}
.hdr .sub{color:var(--muted);font-size:10px;margin-top:2px}
.heroes{display:flex;gap:10px;flex-wrap:wrap}
.hc{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 16px;min-width:130px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.hc .lab{font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.hc .val{font-size:22px;font-weight:900;color:var(--c2026);margin:2px 0}
.bdg{font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;display:inline-block}
.bdg.up{color:#166534;background:#dcfce7}.bdg.dn{color:#991b1b;background:#fee2e2}
.pnl{margin:16px 20px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px 16px 12px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.pnl h2{font-size:14px;font-weight:800;margin-bottom:12px}
.pnl-c{display:flex;justify-content:center;padding:0 20px 16px}
.pnl-c .pnl{margin:0;width:100%;max-width:720px}
.pnl-c .pnl h2{text-align:center}
.cnote{text-align:center;font-size:9px;color:var(--muted);margin-top:6px}
.leg{display:flex;gap:16px;font-size:11px}
.leg .it{display:flex;align-items:center;gap:5px;cursor:pointer;transition:opacity .2s}
.leg .it.dim{opacity:.2}
.leg .ln{width:16px;height:0}
.leg .d24{border-top:2px dashed var(--c2024)}.leg .s25{border-top:2.5px solid var(--c2025)}.leg .s26{border-top:2.5px solid var(--c2026)}
.leg span{font-weight:700}
.tw{display:flex;justify-content:center;padding:0 20px 20px}
.tp{background:var(--card);border:1px solid var(--border);border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.04);overflow:visible;width:100%;max-width:740px}
.tp table{width:100%;border-collapse:collapse}
.tp .hdr1 th{position:sticky;top:0;z-index:20}
.tp .hdr2 th{position:sticky;top:26px;z-index:19;border-bottom:2px solid var(--border)}
.tp th{padding:3px 4px;font-size:10px;font-weight:700;color:var(--text)}
.tp td{padding:2px 4px;font-size:11px;font-variant-numeric:tabular-nums}
.ytd-band{background:var(--ytd-bg);color:var(--text);font-weight:700}
.fy-band{background:var(--fy-bg);color:var(--text);font-weight:700}
.hdr-plain{background:var(--head);color:var(--text);font-weight:700}
.h24{color:var(--c2024);font-weight:800}.h25{color:var(--c2025);font-weight:800}.h26{color:var(--c2026);font-weight:900}
.tp .sh td{padding:7px 4px 2px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--c2026);border-bottom:2px solid var(--c2026);background:var(--card)}
.tp .sbh td{padding:5px 4px 1px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);border-bottom:1px solid var(--border)}
.gc{background:var(--gap);border-left:1.5px solid var(--border);border-right:1.5px solid var(--border);width:6px}
.c4{color:var(--c2024);font-weight:500}.c5{color:var(--c2025);font-weight:500}.c6{color:var(--c2026);font-weight:700}
.ra{text-align:right}.lb{white-space:nowrap;font-weight:500;padding-left:4px!important}
.um-cell{font-size:9px;color:var(--text);text-align:center;font-weight:600}
.it2{font-style:italic;font-weight:400!important;color:var(--text2)}
.ft{padding:4px 24px 20px;text-align:center;font-size:9px;color:var(--muted)}
.loading{padding:60px;text-align:center;color:var(--muted);font-size:14px}
@media(max-width:700px){.hdr{flex-direction:column}.heroes{width:100%}.hc{flex:1;min-width:100px}}
</style>
</head>
<body>
<div id="app"><div class="loading">Loading dashboard data...</div></div>

<script>
var C24='#7cb668',C25='#2d6a2e',C26='#c2410c';

fetch('data/summary.json').then(function(r){return r.json()}).then(function(data){
  var Y=data.years;
  var genAt=data.generatedAt||'';

  // Today's MM-DD for YTD cutoff
  var now=new Date();
  var mmdd=('0'+(now.getMonth()+1)).slice(-2)+'-'+('0'+now.getDate()).slice(-2);

  // Get YTD values from cumulative array
  function ytdVal(yr){
    var cum=(Y[yr]||{}).cumulative||[];
    var last=null;
    for(var i=0;i<cum.length;i++){
      if(cum[i].date.slice(5)<=mmdd) last=cum[i];
    }
    return last?{riders:last.cumRiders,revenue:last.cumRevenue}:{riders:0,revenue:0};
  }

  var ytd24=ytdVal('2024'),ytd25=ytdVal('2025'),ytd26=ytdVal('2026');

  // Full year values
  function fullVal(yr){var y=Y[yr]||{};return{riders:y.totalRiders||0,revenue:y.totalRevenue||0,avg:y.avgOrder||0}}
  var fy24=fullVal('2024'),fy25=fullVal('2025'),fy26=fullVal('2026');

  function fmt(v,u){if(v===null||v===undefined)return'\u2014';if(u==='$')return'$'+Number(v).toLocaleString(undefined,{maximumFractionDigits:0});if(u==='%')return Number(v).toFixed(1)+'%';if(u==='yrs')return v;return Number(v).toLocaleString()}
  function pc(c,p){return(!p||!c)?null:Math.round(((c-p)/p)*100)}
  function safePct(a,b){return b?(a/b*100):null}
  function safeDiv(a,b){return b?(a/b):null}

  var avgYtd26=safeDiv(ytd26.revenue,ytd26.riders);
  var avgYtd25=safeDiv(ytd25.revenue,ytd25.riders);

  // Format date
  function fmtDate(iso){if(!iso)return'';var d=new Date(iso);return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}

  // Route helpers
  var routeNames=['Geronimo 37','Metric Century 64','Century 100','Mt Tam 93','Double Metric 127'];
  function getRoute(yr,name){return((Y[yr]||{}).routes||{})[name]||0}
  function getRoutePct(yr,name){var t=(Y[yr]||{}).totalRiders||0;return t?Math.round(getRoute(yr,name)/t*1000)/10:0}

  // Clothing, gender, food, membership, geography helpers
  function getClothing(yr){return(Y[yr]||{}).clothing||{jersey:{},bibs:{},shorts:{},socks:{},totalExSocks:0}}
  function getGender(yr){return(Y[yr]||{}).gender||{}}
  function getFood(yr){return(Y[yr]||{}).food||{}}
  function getMembership(yr){return(Y[yr]||{}).membership||{}}
  function getGeo(yr){return(Y[yr]||{}).geography||{}}
  function getCoupons(yr){return(Y[yr]||{}).coupons||{}}

  // ======= BUILD HTML =======
  var html='';

  // HEADER
  html+='<div class="hdr"><div><h1>Marin Century 2026</h1>';
  html+='<p class="sub">Registration Dashboard &bull; Updated '+fmtDate(genAt)+'</p></div>';

  // HERO CARDS
  var rPct=pc(ytd26.riders,ytd25.riders);
  var revPct=pc(ytd26.revenue,ytd25.revenue);
  var avgPct=pc(avgYtd26,avgYtd25);
  function badge(p){if(p===null)return'';var cls=p>=0?'up':'dn';var s=p>=0?'+':'';return'<span class="bdg '+cls+'">'+s+p+'% vs 2025 YTD</span>'}

  html+='<div class="heroes">';
  html+='<div class="hc"><div class="lab">2026 Riders YTD</div><div class="val">'+ytd26.riders.toLocaleString()+'</div>'+badge(rPct)+'</div>';
  html+='<div class="hc"><div class="lab">2026 Revenue YTD</div><div class="val">$'+ytd26.revenue.toLocaleString(undefined,{maximumFractionDigits:0})+'</div>'+badge(revPct)+'</div>';
  html+='<div class="hc"><div class="lab">Avg Order</div><div class="val">$'+Math.round(avgYtd26||0)+'</div>'+badge(avgPct)+'</div>';
  html+='</div></div>';

  // CUMULATIVE CHART
  html+='<div class="pnl"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">';
  html+='<h2>Cumulative Registrations &bull; Jan 1 &ndash; Sep 1</h2>';
  html+='<div class="leg" id="cleg"></div></div>';
  html+='<div style="height:300px"><canvas id="cc"></canvas></div></div>';

  // ROUTE CHART
  html+='<div class="pnl-c"><div class="pnl">';
  html+='<h2>Route Comparison by Year (% of Riders)</h2>';
  html+='<div style="height:280px"><canvas id="rc"></canvas></div>';
  html+='<p class="cnote">2024 had 3 routes only &bull; 2026 = year-to-date</p>';
  html+='</div></div>';

  // METRICS TABLE
  html+='<div class="tw"><div class="tp"><table id="mt"></table></div></div>';

  // FOOTER
  html+='<div class="ft">Marin Century Registration Dashboard &bull; Source: RedPodium API &bull; Data as of '+fmtDate(genAt)+'</div>';

  document.getElementById('app').innerHTML=html;

  // ======= CUMULATIVE CHART =======
  // Build daily data aligned by MM-DD across years
  var allDates={};
  ['2024','2025','2026'].forEach(function(yr){
    var cum=(Y[yr]||{}).cumulative||[];
    cum.forEach(function(e){allDates[e.date.slice(5)]=true});
  });
  var sortedDates=Object.keys(allDates).filter(function(d){return d>='01-01'&&d<='09-01'}).sort();
  var mn={1:'Jan',2:'Feb',3:'Mar',4:'Apr',5:'May',6:'Jun',7:'Jul',8:'Aug',9:'Sep'};

  // Build lookup per year
  function buildLookup(yr){
    var cum=(Y[yr]||{}).cumulative||[];
    var lk={};cum.forEach(function(e){lk[e.date.slice(5)]=e.cumRiders});return lk;
  }
  var lk24=buildLookup('2024'),lk25=buildLookup('2025'),lk26=buildLookup('2026');

  function getValAtDate(lk,mmdd2){
    var v=null;var keys=Object.keys(lk).sort();
    for(var i=0;i<keys.length;i++){if(keys[i]<=mmdd2)v=lk[keys[i]]}
    return v;
  }

  // Thin to ~weekly for chart readability
  var chartLabels=[],cd24=[],cd25=[],cd26=[];
  sortedDates.forEach(function(d,i){
    if(i%3!==0&&i!==sortedDates.length-1)return;
    var m=parseInt(d.slice(0,2)),dd=parseInt(d.slice(3));
    var lbl=(dd===1||dd===15)?(mn[m]+' '+dd):'';
    chartLabels.push(lbl);
    cd24.push(getValAtDate(lk24,d));
    cd25.push(getValAtDate(lk25,d));
    cd26.push(d<=mmdd?getValAtDate(lk26,d):null);
  });

  var ctx=document.getElementById('cc').getContext('2d');
  var ch=new Chart(ctx,{type:'line',data:{labels:chartLabels,datasets:[
    {label:'2024',data:cd24,borderColor:C24,borderWidth:1.5,borderDash:[5,3],pointRadius:0,fill:false,tension:.3},
    {label:'2025',data:cd25,borderColor:C25,borderWidth:2,pointRadius:0,fill:false,tension:.3},
    {label:'2026',data:cd26,borderColor:C26,borderWidth:2.5,pointRadius:0,fill:true,
      backgroundColor:function(x){var g=x.chart.ctx.createLinearGradient(0,0,0,x.chart.height);g.addColorStop(0,'rgba(194,65,12,0.18)');g.addColorStop(1,'rgba(194,65,12,0)');return g},tension:.3,spanGaps:false}
  ]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
    plugins:{legend:{display:false},tooltip:{backgroundColor:'#fff',titleColor:'#78716c',bodyColor:'#292524',borderColor:'#e7e5e0',borderWidth:1,padding:10,cornerRadius:6,titleFont:{size:10,weight:'600'},bodyFont:{size:11,weight:'500'},callbacks:{label:function(x){return x.raw!=null?x.dataset.label+': '+x.raw.toLocaleString():null}}}},
    scales:{x:{grid:{display:false},ticks:{font:{size:9},color:'#a8a29e',maxTicksLimit:12,autoSkip:true,autoSkipPadding:20,callback:function(v,i){return chartLabels[i]||null}}},y:{min:0,max:2500,ticks:{font:{size:9},color:'#a8a29e',stepSize:500,callback:function(v){return v.toLocaleString()}},grid:{color:'#e8e5df'}}}}});

  // Legend
  var le=document.getElementById('cleg');var its=[{y:'2024',c:C24,s:'d24'},{y:'2025',c:C25,s:'s25'},{y:'2026',c:C26,s:'s26'}];var ay=null;
  its.forEach(function(it){var d=document.createElement('div');d.className='it';d.innerHTML='<div class="ln '+it.s+'"></div><span style="color:'+it.c+'">'+it.y+'</span>';
  d.onclick=function(){if(ay===it.y)ay=null;else ay=it.y;ch.data.datasets.forEach(function(ds,di){ds.hidden=ay&&its[di].y!==ay});ch.update();le.querySelectorAll('.it').forEach(function(el2,j){el2.className=(!ay||its[j].y===ay)?'it':'it dim'})};le.appendChild(d)});

  // ======= ROUTE CHART =======
  var rctx=document.getElementById('rc').getContext('2d');
  new Chart(rctx,{type:'bar',data:{labels:['Geronimo 37','Metric 64','Century 100','Mt Tam 93','Dbl Metric 127'],datasets:[
    {label:'2024',data:[getRoutePct('2024','Geronimo 37'),getRoutePct('2024','Metric Century 64'),getRoutePct('2024','Century 100'),getRoutePct('2024','Mt Tam 93'),getRoutePct('2024','Double Metric 127')],backgroundColor:C24,borderRadius:2},
    {label:'2025',data:[getRoutePct('2025','Geronimo 37'),getRoutePct('2025','Metric Century 64'),getRoutePct('2025','Century 100'),getRoutePct('2025','Mt Tam 93'),getRoutePct('2025','Double Metric 127')],backgroundColor:C25,borderRadius:2},
    {label:'2026',data:[getRoutePct('2026','Geronimo 37'),getRoutePct('2026','Metric Century 64'),getRoutePct('2026','Century 100'),getRoutePct('2026','Mt Tam 93'),getRoutePct('2026','Double Metric 127')],backgroundColor:C26,borderRadius:2}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:11,weight:'600'},usePointStyle:true,pointStyle:'rect',padding:16}},tooltip:{backgroundColor:'#fff',titleColor:'#78716c',bodyColor:'#292524',borderColor:'#e7e5e0',borderWidth:1,padding:10,cornerRadius:6,callbacks:{label:function(x){return x.dataset.label+': '+x.raw+'%'}}}},scales:{x:{grid:{display:false},ticks:{font:{size:10},color:'#78716c'}},y:{min:0,max:50,ticks:{font:{size:9},color:'#a8a29e',callback:function(v){return v+'%'}},grid:{color:'#e8e5df'}}}}});

  // ======= METRICS TABLE =======
  var t=document.getElementById('mt');
  var h='<colgroup><col style="width:140px"><col style="width:30px"><col style="width:58px"><col style="width:58px"><col style="width:58px"><col style="width:6px"><col style="width:62px"><col style="width:62px"><col style="width:62px"></colgroup>';
  h+='<thead><tr class="hdr1"><th class="hdr-plain"></th><th class="hdr-plain"></th>';
  h+='<th colspan="3" class="ytd-band" style="text-align:center;letter-spacing:.1em;text-transform:uppercase;border-bottom:1.5px solid var(--border);padding:4px 2px 2px">Year to Date ('+mn[now.getMonth()+1]+' '+now.getDate()+')</th>';
  h+='<th style="background:var(--gap);border-left:1.5px solid var(--border);border-right:1.5px solid var(--border);width:6px"></th>';
  h+='<th colspan="3" class="fy-band" style="text-align:center;letter-spacing:.1em;text-transform:uppercase;border-bottom:1.5px solid var(--border);padding:4px 2px 2px">Full Year</th></tr>';
  h+='<tr class="hdr2"><th class="hdr-plain" style="text-align:left"></th><th class="hdr-plain um-cell">UOM</th>';
  h+='<th class="ytd-band ra h24" style="padding:2px 4px">2024</th><th class="ytd-band ra h25" style="padding:2px 4px">2025</th><th class="ytd-band ra h26" style="padding:2px 4px">2026</th>';
  h+='<th style="background:var(--gap);border-left:1.5px solid var(--border);border-right:1.5px solid var(--border);width:6px"></th>';
  h+='<th class="fy-band ra h24" style="padding:2px 4px">2024</th><th class="fy-band ra h25" style="padding:2px 4px">2025</th><th class="fy-band ra h26" style="padding:2px 4px">2026 est</th></tr></thead><tbody>';

  function sh(t2){h+='<tr class="sh"><td colspan="9">'+t2+'</td></tr>'}
  function sbh(t2){h+='<tr class="sbh"><td colspan="9">'+t2+'</td></tr>'}
  function ar(lb,u,y,fl,i,it){var bg=i%2!==0?'background:var(--alt)':'';var lc=it?'lb it2':'lb';
  h+='<tr style="'+bg+'"><td class="'+lc+'">'+lb+'</td><td class="um-cell">'+u+'</td><td class="ra c4">'+fmt(y[0],u)+'</td><td class="ra c5">'+fmt(y[1],u)+'</td><td class="ra c6">'+fmt(y[2],u)+'</td><td class="gc"></td><td class="ra c4">'+fmt(fl[0],u)+'</td><td class="ra c5">'+fmt(fl[1],u)+'</td><td class="ra c6">'+fmt(fl[2],u)+'</td></tr>'}

  // REGISTRATION
  sh('Registration');
  ar('Riders Registered','Units',[ytd24.riders,ytd25.riders,ytd26.riders],[fy24.riders,fy25.riders,null],0);
  ar('Revenue','$',[ytd24.revenue,ytd25.revenue,ytd26.revenue],[fy24.revenue,fy25.revenue,null],1);
  ar('Avg Order','$',[Math.round(safeDiv(ytd24.revenue,ytd24.riders)||0),Math.round(safeDiv(ytd25.revenue,ytd25.riders)||0),Math.round(avgYtd26||0)],[Math.round(fy24.avg),Math.round(fy25.avg),null],2);
  ar('Coupons Used','Units',[null,null,getCoupons('2026').totalUsed||0],[getCoupons('2024').totalUsed||0,getCoupons('2025').totalUsed||0,null],3);
  ar('% Ordering Clothing','%',[null,null,safePct(getClothing('2026').totalExSocks,ytd26.riders)],[safePct(getClothing('2024').totalExSocks,fy24.riders),safePct(getClothing('2025').totalExSocks,fy25.riders),null],4);
  ar('% Buying Membership','%',[null,null,safePct(getMembership('2026').newMembers,ytd26.riders)],[safePct(getMembership('2024').newMembers,fy24.riders),safePct(getMembership('2025').newMembers,fy25.riders),null],5);

  // ROUTES
  sh('Routes');
  routeNames.forEach(function(rn,i){
    ar(rn,'Units',[null,null,getRoute('2026',rn)],[getRoute('2024',rn)||null,getRoute('2025',rn)||null,null],i);
  });

  // DEMOGRAPHICS
  sh('Demographics');
  ar('% Male','%',[null,null,getGender('2026').pctMale],[getGender('2024').pctMale,getGender('2025').pctMale,null],0);
  var femPct=function(yr){var g=getGender(yr);var tot=(g.male||0)+(g.female||0)+(g.other||0);return tot?Math.round(g.female/tot*1000)/10:null};
  ar('% Female','%',[null,null,femPct('2026')],[femPct('2024'),femPct('2025'),null],1);
  ar('Avg Age on Aug 1','yrs',[null,null,null],[(Y['2024']||{}).avgAge,(Y['2025']||{}).avgAge,null],2);
  ar('E-bike Riders','Units',[null,null,(Y['2026']||{}).ebike||0],[(Y['2024']||{}).ebike||0,(Y['2025']||{}).ebike||0,null],3);

  // CLOTHING
  sh('Clothing Detail');
  ['jersey','bibs','shorts','socks'].forEach(function(item,i){
    var lbl=item.charAt(0).toUpperCase()+item.slice(1);
    ar(lbl,'Units',[null,null,(getClothing('2026')[item]||{}).units||0],[(getClothing('2024')[item]||{}).units||0,(getClothing('2025')[item]||{}).units||0,null],i);
  });

  // FOOD
  sh('Food Preference');
  [['No Preference','noPreference'],['Vegetarian','vegetarian'],['Vegan','vegan'],['Gluten-Free','glutenFree']].forEach(function(pair,i){
    ar(pair[0],'%',[null,null,getFood('2026')[pair[1]]],[getFood('2024')[pair[1]],getFood('2025')[pair[1]],null],i);
  });

  // GEOGRAPHICS
  sh('Geographics');

  // Merge top cities across years, ordered by 2026 count
  var citySet={};
  ['2024','2025','2026'].forEach(function(yr){
    (getGeo(yr).topCities||[]).forEach(function(c){citySet[c.city]=true});
  });
  function getCityCount(yr,city){
    var cities=getGeo(yr).topCities||[];
    for(var i=0;i<cities.length;i++){if(cities[i].city===city)return cities[i].riders}
    return 0;
  }
  // Sort by 2026 count descending
  var allCities=Object.keys(citySet).sort(function(a,b){return getCityCount('2026',b)-getCityCount('2026',a)});
  var topCities=allCities.slice(0,20);

  sbh('Top 20 Cities');
  topCities.forEach(function(city,i){
    ar(city,'Units',[null,null,getCityCount('2026',city)],[getCityCount('2024',city)||null,getCityCount('2025',city)||null,null],i);
  });

  sbh('Other California');
  ar('Other California','Units',[null,null,getGeo('2026').otherCA||0],[getGeo('2024').otherCA||0,getGeo('2025').otherCA||0,null],0,true);

  // Non-CA states
  var stateSet={};
  ['2024','2025','2026'].forEach(function(yr){
    var s=getGeo(yr).nonCAStates||{};
    Object.keys(s).forEach(function(k){stateSet[k]=true});
  });
  var stateList=Object.keys(stateSet).sort(function(a,b){
    return((getGeo('2026').nonCAStates||{})[b]||0)-((getGeo('2026').nonCAStates||{})[a]||0);
  }).slice(0,10);

  sbh('Non-CA States');
  stateList.forEach(function(st,i){
