<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marin Century Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fafaf7;
      --card-bg: #ffffff;
      --text: #2c2c2c;
      --text-muted: #7a7a72;
      --border: #e8e6e0;
      --accent-2026: #b45309;
      --accent-2026-light: rgba(180, 83, 9, 0.08);
      --accent-2025: #7c8a6e;
      --accent-2024: #7c8a6e;
      --accent-2024-dash: #b0b8a6;
      --positive: #3d7a3d;
      --negative: #b33a3a;
      --divider-gap: #d5d3cc;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.35;
      -webkit-font-smoothing: antialiased;
    }

    .dashboard {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 24px 60px;
    }

    /* --- HEADER --- */
    .header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 28px;
      font-weight: 400;
      color: var(--text);
      letter-spacing: -0.02em;
    }
    .header .updated {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* --- HERO CHART --- */
    .chart-container {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 24px 24px 16px;
      margin-bottom: 24px;
    }
    .chart-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .chart-subtitle {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }
    .chart-wrapper {
      position: relative;
      height: 340px;
    }
    .chart-legend {
      display: flex;
      gap: 20px;
      margin-top: 12px;
      justify-content: center;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
      transition: opacity 0.2s;
    }
    .legend-item:hover { opacity: 0.7; }
    .legend-item.dimmed { opacity: 0.35; }
    .legend-swatch {
      width: 18px;
      height: 3px;
      border-radius: 2px;
    }
    .legend-swatch.dashed {
      background: repeating-linear-gradient(90deg, var(--accent-2024-dash) 0, var(--accent-2024-dash) 5px, transparent 5px, transparent 9px);
    }

    /* --- SUMMARY CARDS --- */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 18px;
    }
    .card-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .card-value {
      font-family: 'DM Serif Display', serif;
      font-size: 28px;
      font-weight: 400;
      color: var(--accent-2026);
    }
    .card-delta {
      font-size: 11px;
      font-weight: 600;
      margin-top: 4px;
    }
    .card-delta.up { color: var(--positive); }
    .card-delta.down { color: var(--negative); }

    /* --- METRICS TABLE --- */
    .table-section {
      max-width: 780px;
      margin: 0 auto 28px;
    }
    .section-title {
      font-family: 'DM Serif Display', serif;
      font-size: 20px;
      font-weight: 400;
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 2px solid var(--accent-2026);
      display: inline-block;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    thead th {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      font-weight: 600;
      padding: 8px 10px;
      text-align: right;
      border-bottom: 2px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--card-bg);
      z-index: 2;
    }
    thead th:first-child { text-align: left; }
    thead th.divider {
      width: 2px;
      padding: 0;
      border-bottom: none;
      background: var(--card-bg);
    }
    tbody td {
      padding: 7px 10px;
      text-align: right;
      border-bottom: 1px solid var(--border);
    }
    tbody td:first-child {
      text-align: left;
      font-weight: 500;
    }
    tbody td.divider {
      width: 2px;
      padding: 0;
      background: var(--divider-gap);
      border-bottom: 1px solid var(--divider-gap);
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: var(--accent-2026-light); }
    tbody tr:hover td.divider { background: var(--divider-gap); }

    .table-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 4px 0;
      overflow-x: auto;
    }
    .table-card table { min-width: 600px; }
    .table-card thead th, .table-card tbody td {
      padding-left: 16px;
      padding-right: 16px;
    }

    .row-highlight td {
      font-weight: 600 !important;
      border-top: 2px solid var(--border);
    }

    /* --- ROUTE CHART --- */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }
    @media (max-width: 700px) {
      .two-col { grid-template-columns: 1fr; }
    }
    .mini-chart-container {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
    }
    .mini-chart-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .mini-chart-wrapper {
      position: relative;
      height: 220px;
    }

    /* --- GEOGRAPHY --- */
    .geo-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 700px) {
      .geo-grid { grid-template-columns: 1fr; }
    }
    .geo-list {
      list-style: none;
      font-size: 13px;
    }
    .geo-list li {
      display: flex;
      justify-content: space-between;
      padding: 5px 0;
      border-bottom: 1px solid var(--border);
    }
    .geo-list li:last-child { border-bottom: none; }
    .geo-rank {
      color: var(--text-muted);
      font-size: 11px;
      width: 22px;
      flex-shrink: 0;
    }
    .geo-name { flex: 1; }
    .geo-count {
      font-weight: 600;
      min-width: 30px;
      text-align: right;
    }
    .geo-agg {
      font-weight: 600;
      color: var(--text-muted);
      font-style: italic;
    }

    /* --- LOADING / ERROR --- */
    .loading {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
      font-size: 15px;
    }
    .loading .spinner {
      display: inline-block;
      width: 28px;
      height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent-2026);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      text-align: center;
      padding: 60px 20px;
      color: var(--negative);
      font-size: 14px;
    }

    /* --- FOOTER --- */
    .footer {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 40px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

<div class="dashboard" id="app">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div>Loading dashboard data…</div>
  </div>
</div>

<script>
// ============================================================
// MARIN CENTURY DASHBOARD
// ============================================================

const COLORS = {
  '2026': { line: '#b45309', fill: 'rgba(180, 83, 9, 0.10)', width: 3 },
  '2025': { line: '#7c8a6e', fill: 'transparent', width: 2 },
  '2024': { line: '#b0b8a6', fill: 'transparent', width: 1.5, dash: [6, 4] },
};

const ROUTE_ORDER = ['Century 100', 'Metric Century 64', 'Mt Tam 93', 'Geronimo 37', 'Double Metric 127'];
const ROUTE_COLORS = ['#b45309', '#7c8a6e', '#c9956b', '#5a7052', '#d4a574'];

// --- Load data ---
async function loadData() {
  try {
    const resp = await fetch('data/summary.json');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    return await resp.json();
  } catch (e) {
    console.error('Failed to load data:', e);
    return null;
  }
}

// --- Utility ---
function fmt(n) {
  if (n == null) return '—';
  return n.toLocaleString('en-US');
}
function fmtDollar(n) {
  if (n == null) return '—';
  return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}
function fmtPct(n) {
  if (n == null) return '—';
  return n.toFixed(1) + '%';
}
function delta(current, previous) {
  if (!previous || previous === 0) return { text: '', cls: '' };
  const pct = ((current - previous) / previous * 100);
  const sign = pct >= 0 ? '+' : '';
  return {
    text: `${sign}${pct.toFixed(0)}% vs prior year`,
    cls: pct >= 0 ? 'up' : 'down'
  };
}

// --- Normalize cumulative data to day-of-year index ---
function toDayOfYear(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const start = new Date(d.getFullYear(), 0, 0);
  return Math.floor((d - start) / 86400000);
}

function buildCumulativeByDOY(cumData) {
  // Convert to registration-open-relative days
  // Find earliest date, normalize everything relative to it
  if (!cumData || !cumData.length) return [];
  const firstDate = new Date(cumData[0].date + 'T00:00:00');
  return cumData.map(d => ({
    day: Math.floor((new Date(d.date + 'T00:00:00') - firstDate) / 86400000),
    date: d.date,
    riders: d.cumRiders,
    revenue: d.cumRevenue,
  }));
}

// Align all years to same x-axis (days since registration opened)
function alignYears(allYearData) {
  let maxDay = 0;
  const series = {};
  for (const [year, data] of Object.entries(allYearData)) {
    const pts = buildCumulativeByDOY(data.cumulative || []);
    series[year] = pts;
    if (pts.length) maxDay = Math.max(maxDay, pts[pts.length - 1].day);
  }
  return { series, maxDay };
}

// --- Render ---
async function render() {
  const raw = await loadData();
  const app = document.getElementById('app');

  if (!raw || !raw.years) {
    app.innerHTML = `
      <div class="error-msg">
        <p><strong>Could not load dashboard data.</strong></p>
        <p>Make sure <code>data/summary.json</code> exists. Run the aggregation script first.</p>
      </div>`;
    return;
  }

  const years = raw.years;
  const y26 = years['2026'] || {};
  const y25 = years['2025'] || {};
  const y24 = years['2024'] || {};

  const generatedAt = raw.generatedAt ? new Date(raw.generatedAt).toLocaleString() : 'Unknown';

  // --- Build HTML ---
  let html = '';

  // Header
  html += `
    <div class="header">
      <h1>Marin Century Dashboard</h1>
      <div class="updated">Updated ${generatedAt}</div>
    </div>`;

  // Summary cards
  const d_riders = delta(y26.totalRiders || 0, y25.totalRiders || 0);
  const d_revenue = delta(y26.totalRevenue || 0, y25.totalRevenue || 0);
  html += `
    <div class="cards">
      <div class="card">
        <div class="card-label">2026 Riders</div>
        <div class="card-value">${fmt(y26.totalRiders)}</div>
        <div class="card-delta ${d_riders.cls}">${d_riders.text}</div>
      </div>
      <div class="card">
        <div class="card-label">Revenue</div>
        <div class="card-value">${fmtDollar(y26.totalRevenue)}</div>
      </div>
      <div class="card">
        <div class="card-label">Avg Order</div>
        <div class="card-value">${fmtDollar(y26.avgOrder)}</div>
      </div>
      <div class="card">
        <div class="card-label">Conversion</div>
        <div class="card-value">31%</div>
        <div class="card-delta" style="color:var(--text-muted)">RedPodium page</div>
      </div>
    </div>`;

  // Hero chart
  html += `
    <div class="chart-container">
      <div class="chart-title">Cumulative Registrations</div>
      <div class="chart-subtitle">Days since registration opened — click legend to highlight</div>
      <div class="chart-wrapper"><canvas id="heroChart"></canvas></div>
      <div class="chart-legend" id="heroLegend"></div>
    </div>`;

  // Route & Food mini charts
  html += `
    <div class="two-col">
      <div class="mini-chart-container">
        <div class="mini-chart-title">2026 Route Breakdown</div>
        <div class="mini-chart-wrapper"><canvas id="routeChart"></canvas></div>
      </div>
      <div class="mini-chart-container">
        <div class="mini-chart-title">Route Comparison by Year</div>
        <div class="mini-chart-wrapper"><canvas id="routeCompChart"></canvas></div>
      </div>
    </div>`;

  // --- Registration Metrics Table ---
  html += `<div class="table-section">
    <div class="section-title">Registration Metrics</div>
    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th></th>
            <th>2026 YTD</th>
            <th class="divider"></th>
            <th>2025</th>
            <th>2024</th>
          </tr>
        </thead>
        <tbody>
          ${metricRow('Riders', y26.totalRiders, y25.totalRiders, y24.totalRiders)}
          ${metricRow('Revenue', fmtDollar(y26.totalRevenue), fmtDollar(y25.totalRevenue), fmtDollar(y24.totalRevenue), true)}
          ${metricRow('$/Rider', fmtDollar(y26.avgOrder), fmtDollar(y25.avgOrder), fmtDollar(y24.avgOrder), true)}
          ${metricRow('Coupons Used', y26.coupons?.totalUsed, y25.coupons?.totalUsed, y24.coupons?.totalUsed)}
          ${metricRow('Clothing (ex-socks)', y26.clothing?.totalExSocks, y25.clothing?.totalExSocks, y24.clothing?.totalExSocks)}
          ${metricRow('Clothing Rev', fmtDollar(y26.clothing?.totalRevenue), fmtDollar(y25.clothing?.totalRevenue), fmtDollar(y24.clothing?.totalRevenue), true)}
          ${metricRow('T-Shirts', y26.tshirts, y25.tshirts, y24.tshirts)}
          ${metricRow('New Members', y26.membership?.newMembers, y25.membership?.newMembers, y24.membership?.newMembers)}
          ${metricRow('% Male', fmtPct(y26.gender?.pctMale), fmtPct(y25.gender?.pctMale), fmtPct(y24.gender?.pctMale), true)}
          ${metricRow('Avg Age (Aug 1)', y26.avgAge, y25.avgAge, y24.avgAge)}
          ${metricRow('E-Bike', y26.ebike, y25.ebike, y24.ebike)}
        </tbody>
      </table>
    </div>
  </div>`;

  // --- Route Breakdown Table ---
  html += `<div class="table-section">
    <div class="section-title">Routes</div>
    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th>Route</th>
            <th>2026 YTD</th>
            <th class="divider"></th>
            <th>2025</th>
            <th>2024</th>
          </tr>
        </thead>
        <tbody>
          ${ROUTE_ORDER.map(r => metricRow(r,
            y26.routes?.[r] || 0,
            y25.routes?.[r] || 0,
            y24.routes?.[r] || 0
          )).join('')}
        </tbody>
      </table>
    </div>
  </div>`;

  // --- Clothing Table ---
  html += `<div class="table-section">
    <div class="section-title">Clothing</div>
    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th>Item</th>
            <th>2026 Units</th>
            <th>2026 Rev</th>
            <th class="divider"></th>
            <th>2025 Units</th>
            <th>2025 Rev</th>
          </tr>
        </thead>
        <tbody>
          ${clothingRow('Jersey', y26.clothing?.jersey, y25.clothing?.jersey)}
          ${clothingRow('Bibs', y26.clothing?.bibs, y25.clothing?.bibs)}
          ${clothingRow('Shorts', y26.clothing?.shorts, y25.clothing?.shorts)}
          ${clothingRow('Socks', y26.clothing?.socks, y25.clothing?.socks)}
        </tbody>
      </table>
    </div>
  </div>`;

  // --- Food Preferences ---
  html += `<div class="table-section">
    <div class="section-title">Food Preferences</div>
    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th></th>
            <th>2026 YTD</th>
            <th class="divider"></th>
            <th>2025</th>
            <th>2024</th>
          </tr>
        </thead>
        <tbody>
          ${metricRow('No Preference', fmtPct(y26.food?.noPreference), fmtPct(y25.food?.noPreference), fmtPct(y24.food?.noPreference), true)}
          ${metricRow('Vegetarian', fmtPct(y26.food?.vegetarian), fmtPct(y25.food?.vegetarian), fmtPct(y24.food?.vegetarian), true)}
          ${metricRow('Vegan', fmtPct(y26.food?.vegan), fmtPct(y25.food?.vegan), fmtPct(y24.food?.vegan), true)}
          ${metricRow('Gluten-Free', fmtPct(y26.food?.glutenFree), fmtPct(y25.food?.glutenFree), fmtPct(y24.food?.glutenFree), true)}
        </tbody>
      </table>
    </div>
  </div>`;

  // --- Geography ---
  html += `<div class="table-section" style="max-width:100%">
    <div class="section-title">Geography — 2026</div>
    <div class="geo-grid">
      <div class="mini-chart-container">
        <div class="mini-chart-title">Top 20 Cities</div>
        <ul class="geo-list" id="geoTopCities"></ul>
      </div>
      <div class="mini-chart-container">
        <div class="mini-chart-title">Non-CA States</div>
        <ul class="geo-list" id="geoStates"></ul>
      </div>
    </div>
  </div>`;

  // --- Coupon Table ---
  html += `<div class="table-section">
    <div class="section-title">Top Coupon Codes — 2026</div>
    <div class="table-card">
      <table>
        <thead><tr><th>Code</th><th>Uses</th></tr></thead>
        <tbody id="couponBody"></tbody>
      </table>
    </div>
  </div>`;

  // Footer
  html += `
    <div class="footer">
      Marin Century Dashboard · Data via Webconnex API · Auto-updated daily at 6 AM PT
    </div>`;

  app.innerHTML = html;

  // --- Populate Geography ---
  const geoTop = document.getElementById('geoTopCities');
  const topCities = y26.geography?.topCities || [];
  let geoHTML = '';
  topCities.forEach((c, i) => {
    geoHTML += `<li><span class="geo-rank">${i + 1}.</span><span class="geo-name">${c.city}</span><span class="geo-count">${c.riders}</span></li>`;
  });
  if (y26.geography?.otherCA > 0) {
    geoHTML += `<li><span class="geo-rank"></span><span class="geo-name geo-agg">Other California</span><span class="geo-count geo-agg">${y26.geography.otherCA}</span></li>`;
  }
  geoTop.innerHTML = geoHTML;

  const geoStates = document.getElementById('geoStates');
  const ncaStates = y26.geography?.nonCAStates || {};
  let stateHTML = '';
  Object.entries(ncaStates).forEach(([st, count]) => {
    stateHTML += `<li><span class="geo-name">${st}</span><span class="geo-count">${count}</span></li>`;
  });
  if (!stateHTML) stateHTML = '<li style="color:var(--text-muted)">No non-CA registrants yet</li>';
  geoStates.innerHTML = stateHTML;

  // --- Populate Coupons ---
  const couponBody = document.getElementById('couponBody');
  const codes = y26.coupons?.codes || {};
  let coupHTML = '';
  Object.entries(codes).forEach(([code, count]) => {
    coupHTML += `<tr><td>${code}</td><td>${count}</td></tr>`;
  });
  if (!coupHTML) coupHTML = '<tr><td colspan="2" style="color:var(--text-muted)">No coupons used yet</td></tr>';
  couponBody.innerHTML = coupHTML;

  // --- CHARTS ---
  renderHeroChart(years);
  renderRouteChart(y26);
  renderRouteCompChart(years);
}

// --- Table row helpers ---
function metricRow(label, v26, v25, v24, isFormatted = false) {
  const f = isFormatted ? v => v : v => (v != null ? fmt(v) : '—');
  return `<tr>
    <td>${label}</td>
    <td>${isFormatted ? (v26 ?? '—') : f(v26)}</td>
    <td class="divider"></td>
    <td>${isFormatted ? (v25 ?? '—') : f(v25)}</td>
    <td>${isFormatted ? (v24 ?? '—') : f(v24)}</td>
  </tr>`;
}

function clothingRow(label, d26, d25) {
  d26 = d26 || {};
  d25 = d25 || {};
  return `<tr>
    <td>${label}</td>
    <td>${fmt(d26.units || 0)}</td>
    <td>${fmtDollar(d26.revenue || 0)}</td>
    <td class="divider"></td>
    <td>${fmt(d25.units || 0)}</td>
    <td>${fmtDollar(d25.revenue || 0)}</td>
  </tr>`;
}

// --- Hero Chart ---
function renderHeroChart(years) {
  const { series } = alignYears(years);
  const ctx = document.getElementById('heroChart').getContext('2d');

  const datasets = [];
  const yearKeys = ['2024', '2025', '2026'];

  yearKeys.forEach(year => {
    const pts = series[year] || [];
    if (!pts.length) return;
    const cfg = COLORS[year];
    datasets.push({
      label: year,
      data: pts.map(p => ({ x: p.day, y: p.riders })),
      borderColor: cfg.line,
      backgroundColor: cfg.fill,
      borderWidth: cfg.width,
      borderDash: cfg.dash || [],
      pointRadius: 0,
      pointHoverRadius: 4,
      tension: 0.3,
      fill: year === '2026' ? 'origin' : false,
    });
  });

  const chart = new Chart(ctx, {
    type: 'line',
    data: { datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'nearest', axis: 'x', intersect: false },
      scales: {
        x: {
          type: 'linear',
          title: { display: true, text: 'Days since registration opened', color: '#7a7a72', font: { size: 11 } },
          grid: { display: false },
          ticks: { color: '#7a7a72', font: { size: 10 } },
        },
        y: {
          title: { display: true, text: 'Total riders', color: '#7a7a72', font: { size: 11 } },
          grid: { color: '#eee' },
          ticks: { color: '#7a7a72', font: { size: 10 } },
          beginAtZero: true,
        }
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#fff',
          titleColor: '#2c2c2c',
          bodyColor: '#2c2c2c',
          borderColor: '#e8e6e0',
          borderWidth: 1,
          padding: 10,
          callbacks: {
            title: items => `Day ${items[0].parsed.x}`,
            label: item => `${item.dataset.label}: ${fmt(item.parsed.y)} riders`,
          }
        }
      }
    }
  });

  // Build legend
  const legendEl = document.getElementById('heroLegend');
  yearKeys.forEach((year, i) => {
    if (!series[year]?.length) return;
    const cfg = COLORS[year];
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.dataset.year = year;

    const swatch = document.createElement('div');
    swatch.className = 'legend-swatch' + (year === '2024' ? ' dashed' : '');
    swatch.style.background = year === '2024' ? '' : cfg.line;
    item.appendChild(swatch);

    const label = document.createElement('span');
    const totalRiders = series[year][series[year].length - 1]?.riders || 0;
    label.textContent = `${year} (${fmt(totalRiders)})`;
    item.appendChild(label);

    item.addEventListener('click', () => {
      const meta = chart.getDatasetMeta(i);
      meta.hidden = !meta.hidden;
      item.classList.toggle('dimmed');
      chart.update();
    });

    legendEl.appendChild(item);
  });
}

// --- Route Donut ---
function renderRouteChart(y26) {
  const ctx = document.getElementById('routeChart').getContext('2d');
  const routes = y26.routes || {};
  const labels = [];
  const values = [];
  const colors = [];

  ROUTE_ORDER.forEach((r, i) => {
    if (routes[r]) {
      labels.push(r);
      values.push(routes[r]);
      colors.push(ROUTE_COLORS[i % ROUTE_COLORS.length]);
    }
  });

  // Add any unknown routes
  Object.entries(routes).forEach(([r, v]) => {
    if (!ROUTE_ORDER.includes(r) && r !== 'Clothing Only' && r !== 'Unknown') {
      labels.push(r);
      values.push(v);
      colors.push('#999');
    }
  });

  new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{ data: values, backgroundColor: colors, borderWidth: 2, borderColor: '#fff' }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: '55%',
      plugins: {
        legend: {
          position: 'right',
          labels: { font: { size: 11 }, padding: 10, usePointStyle: true, pointStyleWidth: 10 },
        },
        tooltip: {
          callbacks: {
            label: item => `${item.label}: ${fmt(item.raw)} riders (${(item.raw / values.reduce((a, b) => a + b, 0) * 100).toFixed(1)}%)`
          }
        }
      }
    }
  });
}

// --- Route Comparison Bar ---
function renderRouteCompChart(years) {
  const ctx = document.getElementById('routeCompChart').getContext('2d');

  const yearKeys = ['2024', '2025', '2026'];
  const barColors = ['#b0b8a6', '#7c8a6e', '#b45309'];

  const datasets = yearKeys.map((year, i) => ({
    label: year,
    data: ROUTE_ORDER.map(r => years[year]?.routes?.[r] || 0),
    backgroundColor: barColors[i],
    borderRadius: 3,
    barPercentage: 0.8,
  }));

  // Convert to percentages for better comparison
  const pctDatasets = yearKeys.map((year, i) => {
    const total = Object.values(years[year]?.routes || {}).reduce((a, b) => a + b, 0) || 1;
    return {
      label: year,
      data: ROUTE_ORDER.map(r => ((years[year]?.routes?.[r] || 0) / total * 100)),
      backgroundColor: barColors[i],
      borderRadius: 3,
      barPercentage: 0.8,
    };
  });

  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ROUTE_ORDER.map(r => r.replace('Century ', '').replace('Metric ', 'M-')),
      datasets: pctDatasets,
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        x: {
          grid: { display: false },
          ticks: { font: { size: 10 } },
        },
        y: {
          title: { display: true, text: '% of riders', font: { size: 10 }, color: '#7a7a72' },
          grid: { color: '#eee' },
          ticks: { font: { size: 10 }, callback: v => v + '%' },
          beginAtZero: true,
        }
      },
      plugins: {
        legend: {
          position: 'top',
          labels: { font: { size: 11 }, usePointStyle: true, pointStyleWidth: 10, padding: 12 },
        },
        tooltip: {
          callbacks: {
            label: item => `${item.dataset.label}: ${item.parsed.y.toFixed(1)}%`,
          }
        }
      }
    }
  });
}

// --- Run ---
render();
</script>
