<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marin Century 2026 — Registration Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--c2024:#7cb668;--c2025:#2d6a2e;--c2026:#c2410c;--c2026b:#9a3412;--muted:#a8a29e;--bg:#fafaf7;--card:#fff;--border:#e7e5e0;--text:#292524;--text2:#78716c;--alt:#f9f8f5;--head:#f3f2ee;--gap:#efeeea;--ytd-bg:#e8e4da;--fy-bg:#dde5d8}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);font-family:'DM Sans',system-ui,sans-serif;color:var(--text)}
.hdr{padding:20px 24px 0;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px}
.hdr h1{font-size:24px;font-weight:900;color:var(--c2026b);letter-spacing:-0.02em}
.hdr .sub{color:var(--muted);font-size:10px;margin-top:2px}
.heroes{display:flex;gap:10px;flex-wrap:wrap}
.hc{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 16px;min-width:130px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.hc .lab{font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.hc .val{font-size:22px;font-weight:900;color:var(--c2026);margin:2px 0}
.bdg{font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;display:inline-block}
.bdg.up{color:#166534;background:#dcfce7}.bdg.dn{color:#991b1b;background:#fee2e2}
.pnl{margin:16px 20px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px 16px 12px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.pnl h2{font-size:14px;font-weight:800;margin-bottom:12px}
.pnl-c{display:flex;justify-content:center;padding:0 20px 16px}
.pnl-c .pnl{margin:0;width:100%;max-width:720px}
.pnl-c .pnl h2{text-align:center}
.cnote{text-align:center;font-size:9px;color:var(--muted);margin-top:6px}
.leg{display:flex;gap:16px;font-size:11px}
.leg .it{display:flex;align-items:center;gap:5px;cursor:pointer;transition:opacity .2s}
.leg .it.dim{opacity:.2}
.leg .ln{width:16px;height:0}
.leg .d24{border-top:2px dashed var(--c2024)}.leg .s25{border-top:2.5px solid var(--c2025)}.leg .s26{border-top:2.5px solid var(--c2026)}
.leg span{font-weight:700}
.tw{display:flex;justify-content:center;padding:0 20px 20px}
.tp{background:var(--card);border:1px solid var(--border);border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.04);overflow:visible;width:100%;max-width:740px}
.tp table{width:100%;border-collapse:collapse}
.tp .hdr1 th{position:sticky;top:0;z-index:20}
.tp .hdr2 th{position:sticky;top:26px;z-index:19;border-bottom:2px solid var(--border)}
.tp th{padding:3px 4px;font-size:10px;font-weight:700;color:var(--text)}
.tp td{padding:2px 4px;font-size:11px;font-variant-numeric:tabular-nums}
.ytd-band{background:var(--ytd-bg);color:var(--text);font-weight:700}
.fy-band{background:var(--fy-bg);color:var(--text);font-weight:700}
.hdr-plain{background:var(--head);color:var(--text);font-weight:700}
.h24{color:var(--c2024);font-weight:800}.h25{color:var(--c2025);font-weight:800}.h26{color:var(--c2026);font-weight:900}
.tp .sh td{padding:7px 4px 2px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--c2026);border-bottom:2px solid var(--c2026);background:var(--card)}
.tp .sbh td{padding:5px 4px 1px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);border-bottom:1px solid var(--border)}
.gc{background:var(--gap);border-left:1.5px solid var(--border);border-right:1.5px solid var(--border);width:6px}
.c4{color:var(--c2024);font-weight:500}.c5{color:var(--c2025);font-weight:500}.c6{color:var(--c2026);font-weight:700}
.ra{text-align:right}.lb{white-space:nowrap;font-weight:500;padding-left:4px!important}
.um-cell{font-size:9px;color:var(--text);text-align:center;font-weight:600}
.it2{font-style:italic;font-weight:400!important;color:var(--text2)}
.ft{padding:4px 24px 20px;text-align:center;font-size:9px;color:var(--muted)}
.loading{padding:60px;text-align:center;color:var(--muted);font-size:14px}
@media(max-width:700px){.hdr{flex-direction:column}.heroes{width:100%}.hc{flex:1;min-width:100px}}
</style>
</head>
<body>
<div id="app"><div class="loading">Loading dashboard data...</div></div>
<script>
var C24='#7cb668',C25='#2d6a2e',C26='#c2410c';
fetch('data/summary.json').then(function(r){return r.json()}).then(function(data){
  var Y=data.years;var genAt=data.generatedAt||'';
  var now=new Date();var mmdd=('0'+(now.getMonth()+1)).slice(-2)+'-'+('0'+now.getDate()).slice(-2);
  var mn={1:'Jan',2:'Feb',3:'Mar',4:'Apr',5:'May',6:'Jun',7:'Jul',8:'Aug',9:'Sep',10:'Oct',11:'Nov',12:'Dec'};
  var dateLabel=mn[now.getMonth()+1]+' '+now.getDate();

  // Helper: get YTD or full-year object
  function ytd(yr){return(Y[yr]||{}).ytd||{}}
  function fy(yr){return Y[yr]||{}}

  function fmt(v,u){if(v===null||v===undefined)return'\u2014';if(u==='$')return'$'+Number(v).toLocaleString(undefined,{maximumFractionDigits:0});if(u==='%')return Number(v).toFixed(1)+'%';if(u==='yrs')return v;return Number(v).toLocaleString()}
  function pc(c,p){return(!p||!c)?null:Math.round(((c-p)/p)*100)}
  function safePct(a,b){return b?(a/b*100):null}
  function safeDiv(a,b){return b?(a/b):null}
  function fmtDate(iso){if(!iso)return'';var d=new Date(iso);return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
  function badge(p){if(p===null)return'';var cls=p>=0?'up':'dn';var s=p>=0?'+':'';return'<span class="bdg '+cls+'">'+s+p+'% vs 2025 YTD</span>'}

  // Route helpers
  var routeNames=['Geronimo 37','Metric Century 64','Century 100','Mt Tam 93','Double Metric 127'];
  function getRoute(obj,name){return(obj.routes||{})[name]||0}
  function getRoutePct(obj,name){var t=obj.totalRiders||0;return t?Math.round(getRoute(obj,name)/t*1000)/10:0}

  // YTD values
  var y26=ytd('2026'),y25=ytd('2025'),y24=ytd('2024');
  var f26=fy('2026'),f25=fy('2025'),f24=fy('2024');

  var rPct=pc(y26.totalRiders,y25.totalRiders);
  var revPct=pc(y26.totalRevenue,y25.totalRevenue);
  var avgPct=pc(y26.avgOrder,y25.avgOrder);

  // ======= BUILD HTML =======
  var html='';
  html+='<div class="hdr"><div><h1>Marin Century 2026</h1>';
  html+='<p class="sub">Registration Dashboard &bull; Updated '+fmtDate(genAt)+'</p></div>';
  html+='<div class="heroes">';
  html+='<div class="hc"><div class="lab">2026 Riders YTD</div><div class="val">'+(y26.totalRiders||0).toLocaleString()+'</div>'+badge(rPct)+'</div>';
  html+='<div class="hc"><div class="lab">2026 Revenue YTD</div><div class="val">$'+(y26.totalRevenue||0).toLocaleString(undefined,{maximumFractionDigits:0})+'</div>'+badge(revPct)+'</div>';
  html+='<div class="hc"><div class="lab">Avg Order</div><div class="val">$'+Math.round(y26.avgOrder||0)+'</div>'+badge(avgPct)+'</div>';
  html+='</div></div>';

  // Charts
  html+='<div class="pnl"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">';
  html+='<h2>Cumulative Registrations &bull; Jan 1 &ndash; Sep 1</h2>';
  html+='<div class="leg" id="cleg"></div></div>';
  html+='<div style="height:300px"><canvas id="cc"></canvas></div></div>';
  html+='<div class="pnl-c"><div class="pnl">';
  html+='<h2>Route Comparison by Year (% of Riders)</h2>';
  html+='<div style="height:280px"><canvas id="rc"></canvas></div>';
  html+='<p class="cnote">2024 had 3 routes only &bull; 2026 = year-to-date</p>';
  html+='</div></div>';
  html+='<div class="tw"><div class="tp"><table id="mt"></table></div></div>';
  html+='<div class="ft">Marin Century Registration Dashboard &bull; Source: RedPodium API &bull; Data as of '+fmtDate(genAt)+'</div>';
  document.getElementById('app').innerHTML=html;

  // ======= CUMULATIVE CHART =======
  var allDates={};
  ['2024','2025','2026'].forEach(function(yr){((Y[yr]||{}).cumulative||[]).forEach(function(e){allDates[e.date.slice(5)]=true})});
  var sortedDates=Object.keys(allDates).filter(function(d){return d>='01-01'&&d<='09-01'}).sort();
  function buildLookup(yr){var cum=(Y[yr]||{}).cumulative||[];var lk={};cum.forEach(function(e){lk[e.date.slice(5)]=e.cumRiders});return lk}
  var lk24=buildLookup('2024'),lk25=buildLookup('2025'),lk26=buildLookup('2026');
  function getValAtDate(lk,d2){var v=null;var keys=Object.keys(lk).sort();for(var i=0;i<keys.length;i++){if(keys[i]<=d2)v=lk[keys[i]]}return v}
  var chartLabels=[],cd24=[],cd25=[],cd26=[];
  sortedDates.forEach(function(d,i){if(i%3!==0&&i!==sortedDates.length-1)return;var m=parseInt(d.slice(0,2)),dd=parseInt(d.slice(3));var lbl=(dd===1||dd===15)?(mn[m]+' '+dd):'';chartLabels.push(lbl);cd24.push(getValAtDate(lk24,d));cd25.push(getValAtDate(lk25,d));cd26.push(d<=mmdd?getValAtDate(lk26,d):null)});
  var ctx=document.getElementById('cc').getContext('2d');
  var ch=new Chart(ctx,{type:'line',data:{labels:chartLabels,datasets:[
    {label:'2024',data:cd24,borderColor:C24,borderWidth:1.5,borderDash:[5,3],pointRadius:0,fill:false,tension:.3},
    {label:'2025',data:cd25,borderColor:C25,borderWidth:2,pointRadius:0,fill:false,tension:.3},
    {label:'2026',data:cd26,borderColor:C26,borderWidth:2.5,pointRadius:0,fill:true,backgroundColor:function(x){var g=x.chart.ctx.createLinearGradient(0,0,0,x.chart.height);g.addColorStop(0,'rgba(194,65,12,0.18)');g.addColorStop(1,'rgba(194,65,12,0)');return g},tension:.3,spanGaps:false}
  ]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:false},tooltip:{backgroundColor:'#fff',titleColor:'#78716c',bodyColor:'#292524',borderColor:'#e7e5e0',borderWidth:1,padding:10,cornerRadius:6,titleFont:{size:10,weight:'600'},bodyFont:{size:11,weight:'500'},callbacks:{label:function(x){return x.raw!=null?x.dataset.label+': '+x.raw.toLocaleString():null}}}},scales:{x:{grid:{display:false},ticks:{font:{size:9},color:'#a8a29e',maxTicksLimit:12,autoSkip:true,autoSkipPadding:20,callback:function(v,i){return chartLabels[i]||null}}},y:{min:0,max:2500,ticks:{font:{size:9},color:'#a8a29e',stepSize:500,callback:function(v){return v.toLocaleString()}},grid:{color:'#e8e5df'}}}}});
  var le=document.getElementById('cleg');var its=[{y:'2024',c:C24,s:'d24'},{y:'2025',c:C25,s:'s25'},{y:'2026',c:C26,s:'s26'}];var ay=null;
  its.forEach(function(it){var d=document.createElement('div');d.className='it';d.innerHTML='<div class="ln '+it.s+'"></div><span style="color:'+it.c+'">'+it.y+'</span>';d.onclick=function(){if(ay===it.y)ay=null;else ay=it.y;ch.data.datasets.forEach(function(ds,di){ds.hidden=ay&&its[di].y!==ay});ch.update();le.querySelectorAll('.it').forEach(function(el2,j){el2.className=(!ay||its[j].y===ay)?'it':'it dim'})};le.appendChild(d)});

  // ======= ROUTE CHART =======
  var rctx=document.getElementById('rc').getContext('2d');
  new Chart(rctx,{type:'bar',data:{labels:['Geronimo 37','Metric 64','Century 100','Mt Tam 93','Dbl Metric 127'],datasets:[
    {label:'2024',data:[getRoutePct(f24,'Geronimo 37'),getRoutePct(f24,'Metric Century 64'),getRoutePct(f24,'Century 100'),getRoutePct(f24,'Mt Tam 93'),getRoutePct(f24,'Double Metric 127')],backgroundColor:C24,borderRadius:2},
    {label:'2025',data:[getRoutePct(f25,'Geronimo 37'),getRoutePct(f25,'Metric Century 64'),getRoutePct(f25,'Century 100'),getRoutePct(f25,'Mt Tam 93'),getRoutePct(f25,'Double Metric 127')],backgroundColor:C25,borderRadius:2},
    {label:'2026',data:[getRoutePct(f26,'Geronimo 37'),getRoutePct(f26,'Metric Century 64'),getRoutePct(f26,'Century 100'),getRoutePct(f26,'Mt Tam 93'),getRoutePct(f26,'Double Metric 127')],backgroundColor:C26,borderRadius:2}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:11,weight:'600'},usePointStyle:true,pointStyle:'rect',padding:16}},tooltip:{backgroundColor:'#fff',titleColor:'#78716c',bodyColor:'#292524',borderColor:'#e7e5e0',borderWidth:1,padding:10,cornerRadius:6,callbacks:{label:function(x){return x.dataset.label+': '+x.raw+'%'}}}},scales:{x:{grid:{display:false},ticks:{font:{size:10},color:'#78716c'}},y:{min:0,max:50,ticks:{font:{size:9},color:'#a8a29e',callback:function(v){return v+'%'}},grid:{color:'#e8e5df'}}}}});

  // ======= METRICS TABLE =======
  var t=document.getElementById('mt');
  var h='<colgroup><col style="width:140px"><col style="width:30px"><col style="width:58px"><col style="width:58px"><col style="width:58px"><col style="width:6px"><col style="width:62px"><col style="width:62px"><col style="width:62px"></colgroup>';
  h+='<thead><tr class="hdr1"><th class="hdr-plain"></th><th class="hdr-plain"></th>';
  h+='<th colspan="3" class="ytd-band" style="text-align:center;letter-spacing:.1em;text-transform:uppercase;border-bottom:1.5px solid var(--border);padding:4px 2px 2px">Year to Date ('+dateLabel+')</th>';
  h+='<th style="background:var(--gap);border-left:1.5px solid var(--border);border-right:1.5px solid var(--border);width:6px"></th>';
  h+='<th colspan="3" class="fy-band" style="text-align:center;letter-spacing:.1em;text-transform:uppercase;border-bottom:1.5px solid var(--border);padding:4px 2px 2px">Full Year</th></tr>';
  h+='<tr class="hdr2"><th class="hdr-plain" style="text-align:left"></th><th class="hdr-plain um-cell">UOM</th>';
  h+='<th class="ytd-band ra h24" style="padding:2px 4px">2024</th><th class="ytd-band ra h25" style="padding:2px 4px">2025</th><th class="ytd-band ra h26" style="padding:2px 4px">2026</th>';
  h+='<th style="background:var(--gap);border-left:1.5px solid var(--border);border-right:1.5px solid var(--border);width:6px"></th>';
  h+='<th class="fy-band ra h24" style="padding:2px 4px">2024</th><th class="fy-band ra h25" style="padding:2px 4px">2025</th><th class="fy-band ra h26" style="padding:2px 4px">2026 est</th></tr></thead><tbody>';

  function sh(t2){h+='<tr class="sh"><td colspan="9">'+t2+'</td></tr>'}
  function sbh(t2){h+='<tr class="sbh"><td colspan="9">'+t2+'</td></tr>'}
  function ar(lb,u,yv,fv,i,it){var bg=i%2!==0?'background:var(--alt)':'';var lc=it?'lb it2':'lb';
  h+='<tr style="'+bg+'"><td class="'+lc+'">'+lb+'</td><td class="um-cell">'+u+'</td><td class="ra c4">'+fmt(yv[0],u)+'</td><td class="ra c5">'+fmt(yv[1],u)+'</td><td class="ra c6">'+fmt(yv[2],u)+'</td><td class="gc"></td><td class="ra c4">'+fmt(fv[0],u)+'</td><td class="ra c5">'+fmt(fv[1],u)+'</td><td class="ra c6">'+fmt(fv[2],u)+'</td></tr>'}

  // REGISTRATION
  sh('Registration');
  ar('Riders Registered','Units',[y24.totalRiders,y25.totalRiders,y26.totalRiders],[f24.totalRiders,f25.totalRiders,null],0);
  ar('Revenue','$',[y24.totalRevenue,y25.totalRevenue,y26.totalRevenue],[f24.totalRevenue,f25.totalRevenue,null],1);
  ar('Avg Order','$',[Math.round(y24.avgOrder||0),Math.round(y25.avgOrder||0),Math.round(y26.avgOrder||0)],[Math.round(f24.avgOrder||0),Math.round(f25.avgOrder||0),null],2);
  ar('Coupons Used','Units',[(y24.coupons||{}).totalUsed,(y25.coupons||{}).totalUsed,(y26.coupons||{}).totalUsed],[(f24.coupons||{}).totalUsed,(f25.coupons||{}).totalUsed,null],3);
  ar('% Ordering Clothing','%',[safePct((y24.clothing||{}).totalExSocks,y24.totalRiders),safePct((y25.clothing||{}).totalExSocks,y25.totalRiders),safePct((y26.clothing||{}).totalExSocks,y26.totalRiders)],[safePct((f24.clothing||{}).totalExSocks,f24.totalRiders),safePct((f25.clothing||{}).totalExSocks,f25.totalRiders),null],4);
  ar('% Buying Membership','%',[safePct((y24.membership||{}).newMembers,y24.totalRiders),safePct((y25.membership||{}).newMembers,y25.totalRiders),safePct((y26.membership||{}).newMembers,y26.totalRiders)],[safePct((f24.membership||{}).newMembers,f24.totalRiders),safePct((f25.membership||{}).newMembers,f25.totalRiders),null],5);

  // ROUTES
  sh('Routes');
  routeNames.forEach(function(rn,i){ar(rn,'Units',[getRoute(y24,rn)||null,getRoute(y25,rn)||null,getRoute(y26,rn)||null],[getRoute(f24,rn)||null,getRoute(f25,rn)||null,null],i)});

  // DEMOGRAPHICS
  sh('Demographics');
  ar('% Male','%',[(y24.gender||{}).pctMale,(y25.gender||{}).pctMale,(y26.gender||{}).pctMale],[(f24.gender||{}).pctMale,(f25.gender||{}).pctMale,null],0);
  var femPct=function(o){var g=o.gender||{};var tot=(g.male||0)+(g.female||0)+(g.other||0);return tot?Math.round(g.female/tot*1000)/10:null};
  ar('% Female','%',[femPct(y24),femPct(y25),femPct(y26)],[femPct(f24),femPct(f25),null],1);
  ar('Avg Age on Aug 1','yrs',[null,null,null],[f24.avgAge,f25.avgAge,null],2);
  ar('E-bike Riders','Units',[y24.ebike||null,y25.ebike||null,y26.ebike||null],[f24.ebike||null,f25.ebike||null,null],3);

  // CLOTHING
  sh('Clothing Detail');
  ['jersey','bibs','shorts','socks'].forEach(function(item,i){var lbl=item.charAt(0).toUpperCase()+item.slice(1);ar(lbl,'Units',[((y24.clothing||{})[item]||{}).units||null,((y25.clothing||{})[item]||{}).units||null,((y26.clothing||{})[item]||{}).units||null],[((f24.clothing||{})[item]||{}).units||null,((f25.clothing||{})[item]||{}).units||null,null],i)});

  // FOOD
  sh('Food Preference');
  [['No Preference','noPreference'],['Vegetarian','vegetarian'],['Vegan','vegan'],['Gluten-Free','glutenFree']].forEach(function(pair,i){ar(pair[0],'%',[(y24.food||{})[pair[1]],(y25.food||{})[pair[1]],(y26.food||{})[pair[1]]],[(f24.food||{})[pair[1]],(f25.food||{})[pair[1]],null],i)});

  // GEOGRAPHICS
  sh('Geographics');
  var citySet={};['2024','2025','2026'].forEach(function(yr){((fy(yr).geography||{}).topCities||[]).forEach(function(c){citySet[c.city]=true})});
  function getCityCount(obj,city){var cities=(obj.geography||{}).topCities||[];for(var i=0;i<cities.length;i++){if(cities[i].city===city)return cities[i].riders}return 0}
  var allCities=Object.keys(citySet).sort(function(a,b){return getCityCount(f26,b)-getCityCount(f26,a)}).slice(0,20);
  sbh('Top 20 Cities');
  allCities.forEach(function(city,i){ar(city,'Units',[getCityCount(y24,city)||null,getCityCount(y25,city)||null,getCityCount(y26,city)||null],[getCityCount(f24,city)||null,getCityCount(f25,city)||null,null],i)});
  sbh('Other California');
  ar('Other California','Units',[(y24.geography||{}).otherCA||null,(y25.geography||{}).otherCA||null,(y26.geography||{}).otherCA||null],[(f24.geography||{}).otherCA||null,(f25.geography||{}).otherCA||null,null],0,true);
  var stateSet={};['2024','2025','2026'].forEach(function(yr){var s=(fy(yr).geography||{}).nonCAStates||{};Object.keys(s).forEach(function(k){stateSet[k]=true})});
  var stateList=Object.keys(stateSet).sort(function(a,b){return(((f26.geography||{}).nonCAStates||{})[b]||0)-(((f26.geography||{}).nonCAStates||{})[a]||0)}).slice(0,10);
  sbh('Non-CA States');
  stateList.forEach(function(st,i){ar(st,'Units',[((y24.geography||{}).nonCAStates||{})[st]||null,((y25.geography||{}).nonCAStates||{})[st]||null,((y26.geography||{}).nonCAStates||{})[st]||null],[((f24.geography||{}).nonCAStates||{})[st]||null,((f25.geography||{}).nonCAStates||{})[st]||null,null],i)});
  h+='</tbody>';t.innerHTML=h;
}).catch(function(err){document.getElementById('app').innerHTML='<div class="loading" style="color:#991b1b">Error loading data: '+err.message+'<br>Run refresh-dashboard.bat first.</div>'});
</script>
</body>
</html>
